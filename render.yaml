services:
  - type: web
    name: learntrack-backend
    runtime: java
    rootDir: backend
    buildCommand: mvn clean package -DskipTests
    startCommand: java -Dspring.profiles.active=prod -jar target/backend-0.0.1-SNAPSHOT.jar
    envVars:
      - key: JWT_SECRET
        value: learntrack_secret_key_2026_very_long_secret_key_for_jwt
      - key: DATABASE_URL
        fromDatabase:
          name: learntrack-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: learntrack-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: learntrack-db
          property: password

databases:
  - name: learntrack-db
    databaseName: learntrack
    user: learntrack
