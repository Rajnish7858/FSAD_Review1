services:
  - type: web
    name: learntrack-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: JWT_SECRET
        value: learntrack_secret_key_2026_very_long_secret_key_for_jwt
      - key: DATABASE_URL
        fromDatabase:
          name: learntrack-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: learntrack-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: learntrack-db
          property: password

databases:
  - name: learntrack-db
    databaseName: learntrack
    user: learntrack
    plan: free
